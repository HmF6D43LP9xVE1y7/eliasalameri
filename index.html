<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="author" content="Elias Al Ameri">
		<meta name="description" content="">
		<meta name="keywords" content="">
		<meta name="robots" content="index, nofollow, noimageindex">
		<meta name="googlebot" content="index, nofollow, noimageindex">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="shortcut icon" type="image/png" href="./docs/docs_favicon.png">
		<title>
			Elias Al Ameri
		</title>
		<style>
			@font-face {
				font-family: 'font';
				src: url('assets/font/docs_font.eot');
				src: url('assets/font/docs_font.eot?#iefix') format('embedded-opentype'),
					url('assets/font/docs_font.woff2') format('woff2'),
					url('assets/font/docs_font.woff') format('woff'),
					url('assets/font/docs_font.ttf') format('truetype'),
					url('assets/font/docs_font.svg#d-dinregular') format('svg');
				font-weight: normal;
				font-style: normal;
			}
			::-webkit-scrollbar {
				display: none;
			}
			* {
				background-color: transparent;

				padding: 0;
				margin: 0;

				-ms-overflow-style: none;
				scrollbar-width: none;

				-webkit-user-select: none;
				-webkit-touch-callout: none;
				-moz-user-select: none;
				-ms-user-select: none;
				user-select: none;

				font-family: "font";
				text-transform: none;
				text-decoration: none;
				color: black;
				line-height: 1.2;
			}
			.overlay {
				pointer-events: none;
			}
			.topleft, .bottomleft, .topright, .bottomright {
				position: fixed;
				z-index: 3;
			}
			.topleft {
				top: 0;
				left: 0;

				text-align: left;
			}
			.bottomleft {
				bottom: 0;
				left: 0;

				text-align: left;
			}
			.topright {
				top: 0;
				right: 0;

				text-align: right;
			}
			.bottomright {
				bottom: 0;
				right: 0;

				text-align: right;
			}
			.overlay title {
				pointer-events: all;
				display: block;

				margin: 12px 12px 12px 12px;

				font-size: 24px;
			}
			.overlay title:hover {
				color: #c0c0c0;
			}
			.overlay title, .overlay title:hover {
				pointer-events: all;

				transition: .25s;
				-o-transition: .25s;
				-ms-transition: .25s;
				-moz-transition: .25s;
				-webkit-transition: .25s;
			}
			.main {
				z-index: 0;
				
				left: 0;
				top: 0;
				right: 0;
				bottom: 0;
			}
			.main img {
				height: auto;
				width: auto;

				position: absolute;
				z-index: 1;

				max-width: 100vw;
				max-height: 100vh;

				top: 50%;
				left: 50%;

				transform: translate(-50%, -50%);
			}

/* CAROUSEL CSS UNCLEANED */

			.carousel-control-prev {
				justify-content: left;
				left:0
			}
			.carousel-control-next {
				justify-content: right;
				right:0
			}
			.carousel-control-next,.carousel-control-prev {
				position:absolute;
				top:0;
				bottom:0;
				display:flex;
				align-items:center;
				margin: 100px 0px 100px 0px;
				color: red;
				text-align:center;
				background:0 0;
				border:0;
				opacity:.5;
				transition: opacity .25s ease;
				width: 100px;
				height: calc(100vh - 200px);
				background-color: lightblue;
			}
			.carousel-control-next:focus,.carousel-control-next:hover,.carousel-control-prev:focus,.carousel-control-prev:hover {
				color:green;
				text-decoration:none;
				outline:0;
				opacity:.9;
				background-color: green;
				width: 100px;
			}
			.carousel-control-next-icon,.carousel-control-prev-icon {
				background-color: yellow;
				display:inline-block;
				width: 36px;
				height: 36px;
				background-repeat:no-repeat;
				background-position:50%;
				background-size:100% 100%
			}
			.carousel-control-prev-icon:hover, .carousel-control-next-icon:hover {
				cursor: pointer;
				background-color: yellow;
			}
			.carousel-control-prev-icon {
				background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='red'%3e%3cpath d='M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z'/%3e%3c/svg%3e")
			}
			.carousel-control-next-icon {
				background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='red'%3e%3cpath d='M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e")
			}
			.carousel-indicators, .carousel-control-next, .carousel-control-prev {
				z-index: 2;
			}
			.carousel-indicators {
				position:absolute;
				right:0;
				bottom:0;
				left:0;
				display: flex;
				justify-content: center;
				margin-bottom: 12px;
				list-style: none
			}
			.carousel-indicators [data-bs-target] {
				box-sizing:content-box;
				flex:0 1 auto;
				width:24px;
				height:2px;
				padding:0;
				margin-right:3px;
				margin-left:3px;
				text-indent:-999px;
				cursor:pointer;
				background-color:black;
				background-clip:padding-box;
				border:0;
				border-top:10px solid transparent;
				border-bottom:10px solid transparent;
				opacity:.2;
				transition: opacity .25s ease
			}
			.carousel-indicators .active {
				opacity:1
			}
			.carousel-item {
				height: 100vh;
				width: 100vw;
				display:none;
				float:left;
				margin-right:-100%;
				-webkit-backface-visibility:hidden;
				backface-visibility: hidden;
				transition: transform .25s ease-in-out
			}
			.carousel-item-next, .carousel-item-prev, .carousel-item.active {
				display:block
			}
			.active.carousel-item-end, .carousel-item-next:not(.carousel-item-start) {
				transform:translateX(100%)
			}
			.active.carousel-item-start, .carousel-item-prev:not(.carousel-item-end) {
				transform:translateX(-100%)
			}

/* CAROUSEL CSS UNCLEANED */

		</style>
	</head>
	<body oncontextmenu="return false">
		<div class="overlay">
			<div class="topleft">
				<a href="">
					<title>
						topleft
					</title>
				</a>
			</div>
			<div class="bottomleft">
				<a href="">
					<title>
						bottomleft
					</title>
				</a>
			</div>
			<div class="topright">
				<a href="">
					<title>
						topright
					</title>
				</a>
			</div>
			<div class="bottomright">
				<a href="">
					<title>
						bottomright
					</title>
				</a>
			</div>
		</div>
		<div class="main">
			<div id="carousel" class="carousel slide" data-bs-ride="carousel">
				<button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
					<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				</button>
				<button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
					<span class="carousel-control-next-icon" aria-hidden="true"></span>
				</button>
				<div class="carousel-indicators">
					<button type="button" data-bs-target="#carousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
					<button type="button" data-bs-target="#carousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
					<button type="button" data-bs-target="#carousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
					<button type="button" data-bs-target="#carousel" data-bs-slide-to="3" aria-label="Slide 4"></button>
				</div>
				<div class="carousel-item active">
					<img class="img" src="assets/images/000.jpg">
				</div>
				<div class="carousel-item">
					<img class="img" src="assets/images/001.jpg">
				</div>
				<div class="carousel-item">
					<img class="img" src="assets/images/002.jpg">
				</div>
				<div class="carousel-item">
					<img class="img" src="assets/images/003.jpg">
				</div>
			</div>
		</div>
		<script src="js/bootstrap.bundle.min.js"></script>
	</body>
</html>
